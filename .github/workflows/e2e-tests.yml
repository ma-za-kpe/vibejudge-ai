name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        browser: [chromium]  # Fast smoke tests on Chromium only

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Start Streamlit app (background)
        run: |
          streamlit run streamlit_ui/VibeJudge_AI_Dashboard.py --server.port 8501 &
          echo "Waiting for Streamlit to start..."
          sleep 10
        env:
          API_BASE_URL: http://localhost:8000
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}

      - name: Start FastAPI backend (background)
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for FastAPI to start..."
          sleep 5
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8501 http://localhost:8000/health -t 30000

      - name: Run smoke tests
        run: |
          pytest e2e_tests/tests/ -m smoke -v --tb=short --maxfail=3
        env:
          E2E_BASE_URL: http://localhost:8501
          API_BASE_URL: http://localhost:8000
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-screenshots-${{ matrix.browser }}
          path: e2e_tests/visual_regression/failures/
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report-${{ matrix.browser }}
          path: e2e_tests/reports/
          retention-days: 7

  e2e-full:
    name: E2E Full Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}

      - name: Start Streamlit app
        run: |
          streamlit run streamlit_ui/VibeJudge_AI_Dashboard.py --server.port 8501 &
          sleep 10
        env:
          API_BASE_URL: http://localhost:8000
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}

      - name: Start FastAPI backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8501 http://localhost:8000/health -t 30000

      - name: Run full E2E suite
        run: |
          pytest e2e_tests/tests/ -v --tb=short --html=e2e_tests/reports/report.html --self-contained-html
        env:
          E2E_BASE_URL: http://localhost:8501
          API_BASE_URL: http://localhost:8000
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: e2e_tests/visual_regression/failures/
          retention-days: 14

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report-${{ matrix.browser }}
          path: e2e_tests/reports/
          retention-days: 14

  e2e-critical:
    name: E2E Critical Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Start Streamlit app
        run: |
          streamlit run streamlit_ui/VibeJudge_AI_Dashboard.py --server.port 8501 &
          sleep 10
        env:
          API_BASE_URL: http://localhost:8000

      - name: Start FastAPI backend
        run: |
          cd backend
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Wait for services
        run: |
          npx wait-on http://localhost:8501 http://localhost:8000/health -t 30000

      - name: Run critical tests
        run: |
          pytest e2e_tests/tests/ -m critical -v --tb=short
        env:
          E2E_BASE_URL: http://localhost:8501
          API_BASE_URL: http://localhost:8000
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          HEADLESS: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: critical-test-screenshots
          path: e2e_tests/visual_regression/failures/
          retention-days: 7

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'e2e_tests/reports/summary.txt';
            let summary = 'E2E critical tests completed.';

            if (fs.existsSync(reportPath)) {
              summary = fs.readFileSync(reportPath, 'utf8');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎭 E2E Test Results\n\n${summary}`
            });

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [e2e-smoke, e2e-full, e2e-critical]
    if: failure()

    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ E2E tests failed on ${{ github.ref }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*E2E Tests Failed* :x:\n\n*Branch:* `${{ github.ref }}`\n*Commit:* ${{ github.sha }}\n*Author:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
